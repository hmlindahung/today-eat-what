<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>116 會考倒數｜每日圖卡</title>
<style>
  :root{
    --board:#22453B;
    --board-deep:#1A362E;
    --chalk:#F5F1E6;
    --chalk-dim:rgba(245,241,230,.6);
    --hi:#F2C94C;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{background:var(--board-deep) !important;}
  body{
    background:var(--board-deep) !important;
    color:var(--chalk);
    font-family:"PingFang TC","Heiti TC","Microsoft JhengHei",system-ui,-apple-system,sans-serif;
    min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:max(18px, env(safe-area-inset-top)) 18px calc(28px + env(safe-area-inset-bottom));
  }
  .wrap{width:100%;max-width:430px;}
  header{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:4px 2px 16px;
  }
  .brand{font-size:12px;letter-spacing:.24em;color:var(--chalk-dim);}
  .today{font-size:13px;color:var(--chalk-dim);letter-spacing:.06em;}

  #cardImg{
    display:block;width:100%;border-radius:20px;
    box-shadow:0 10px 34px rgba(0,0,0,.4);
  }
  .hint{
    text-align:center;font-size:14px;color:var(--chalk);
    margin:16px 0 4px;letter-spacing:.1em;
  }
  .hint .hl{color:var(--hi);font-weight:700;}
  .subhint{text-align:center;font-size:12px;color:var(--chalk-dim);letter-spacing:.06em;}

  .actions{display:flex;gap:10px;margin-top:18px;}
  .actions button{
    flex:1;border:1px solid rgba(245,241,230,.28);border-radius:14px;
    background:rgba(0,0,0,.18);color:var(--chalk);
    font-family:inherit;font-size:14px;letter-spacing:.08em;
    padding:13px 8px;cursor:pointer;transition:transform .12s ease;
  }
  .actions button:active{transform:scale(.97);}
  .actions button.done{background:var(--hi);color:var(--board-deep);border-color:var(--hi);font-weight:700;}
  .actions button:focus-visible{outline:3px solid var(--hi);outline-offset:2px;}

  details{margin-top:22px;border-top:1px solid rgba(245,241,230,.14);padding-top:14px;}
  summary{
    list-style:none;cursor:pointer;font-size:13px;color:var(--chalk-dim);
    letter-spacing:.14em;display:flex;align-items:center;
  }
  summary::-webkit-details-marker{display:none;}
  summary::after{content:"▾";margin-left:auto;transition:transform .2s;}
  details[open] summary::after{transform:rotate(180deg);}
  .setting{margin-top:14px;font-size:13px;color:var(--chalk-dim);line-height:1.7;}
  .setting label{display:block;margin-bottom:6px;color:var(--chalk);}
  .setting input[type="date"]{
    width:100%;padding:10px 12px;border-radius:10px;
    border:1px solid rgba(245,241,230,.25);
    background:rgba(0,0,0,.2);color:var(--chalk);
    font-family:inherit;font-size:15px;color-scheme:dark;
  }
  .note{margin-top:8px;font-size:12px;color:var(--chalk-dim);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">116 會考倒數・每日圖卡</div>
    <div class="today" id="todayLabel"></div>
  </header>

  <img id="cardImg" alt="今日會考倒數圖卡">
  <div class="hint"><span class="hl">長按圖片</span> → 儲存，貼進群組就完成</div>
  <div class="subhint">每天打開，圖卡自動更新為當日內容</div>

  <div class="actions">
    <button id="dlBtn" type="button">儲存圖卡</button>
    <button id="copyBtn" type="button">複製文字版</button>
  </div>

  <details>
    <summary>設定考試日期</summary>
    <div class="setting">
      <label for="examDate">116 會考第一天</label>
      <input type="date" id="examDate">
      <div class="note">目前預設 2027/5/15（暫定，依歷年慣例推估）。官方公告正式日期後在這裡改即可，設定存在這支手機／瀏覽器裡。模擬考日期在檔案內 ③ 區塊修改。</div>
    </div>
  </details>

</div>

<script>
/* ═══════════════════════════════════════════════════
   ①【考試日期】預設值（頁面上可改，存 localStorage）
   ═══════════════════════════════════════════════════ */
const DEFAULT_EXAM_DATE = "2027-05-15";

/* ═══════════════════════════════════════════════════
   ②【品牌落款】圖卡底部的署名，請改成妳要的文字
   ═══════════════════════════════════════════════════ */
const BRAND_LINE = "🌿 暖心轉譯者・陪你一天一天倒數";

/* ═══════════════════════════════════════════════════
   ②-1【IG 帳號】顯示在圖卡右下角（小字、不搶版面）
   留空字串 "" 則不顯示
   ═══════════════════════════════════════════════════ */
const IG_HANDLE = "@heart_0512";

/* ═══════════════════════════════════════════════════
   ③【模擬考】115 學年度大回次遴選版本
   圖卡會自動鎖定「下一場」模考顯示倒數與範圍；
   當天顯示「今天登場」，四場結束後面板自動隱藏。
   日期或範圍若與貴校／貴班不同，直接改這裡。
   ═══════════════════════════════════════════════════ */
const MOCKS = [
  { name:"第一次模擬考", start:"2026-09-08", end:"2026-09-09",
    scope:"1–2 冊（自然：1、3 冊）", vendor:"南一" },
  { name:"第二次模擬考", start:"2026-12-23", end:"2026-12-24",
    scope:"1–4 冊", vendor:"翰林" },
  { name:"第三次模擬考", start:"2027-02-18", end:"2027-02-19",
    scope:"1–5 冊", vendor:"南一" },
  { name:"第四次模擬考", start:"2027-04-15", end:"2027-04-16",
    scope:"1–6 冊", vendor:"康軒" }
];

/* ── 以下為程式邏輯，正常情況不需要動 ── */
const WEEK = ["日","一","二","三","四","五","六"];
const W = 1080, H = 1350;

function parseD(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function getExamDate(){ return localStorage.getItem("cap116_exam_date") || DEFAULT_EXAM_DATE; }
function todayMid(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function diffDays(target){ return Math.round((target-todayMid())/86400000); }
function daysLeft(){ return diffDays(parseD(getExamDate())); }
function todayStr(){
  const t=new Date();
  return (t.getMonth()+1)+"/"+t.getDate()+"（"+WEEK[t.getDay()]+"）";
}
function fmtMD(s){
  const d=parseD(s);
  return (d.getMonth()+1)+"/"+d.getDate()+"（"+WEEK[d.getDay()]+"）";
}
function currentMock(){
  const today=todayMid();
  for(const m of MOCKS){
    if(today>=parseD(m.start) && today<=parseD(m.end)) return {...m, status:"ongoing"};
    if(today<parseD(m.start)) return {...m, status:"upcoming", days:diffDays(parseD(m.start))};
  }
  return null;
}
function milestone(days){
  if(days===100) return "正式進入倒數 100 天";
  if(days>0 && days%100===0) return "倒數整 "+days+" 天";
  if(days===50) return "最後 50 天，穩住節奏";
  if(days===30) return "最後 30 天，穩住節奏";
  if(days===7)  return "最後一週，照顧好身體";
  if(days===1)  return "明天上場，今晚早點睡";
  return "";
}

function wrapText(ctx,text,maxWidth){
  const lines=[]; let line="";
  for(const ch of text){
    if(ctx.measureText(line+ch).width>maxWidth && line){ lines.push(line); line=ch; }
    else{ line+=ch; }
  }
  if(line) lines.push(line);
  return lines;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawCard(){
  const cv=document.createElement("canvas");
  cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  const days=daysLeft();
  const FONT='"PingFang TC","Heiti TC","Microsoft JhengHei",system-ui,sans-serif';
  const chalk="#F5F1E6", dim="rgba(245,241,230,.62)", hi="#F2C94C", CX=W/2;

  ctx.fillStyle="#22453B"; ctx.fillRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"rgba(0,0,0,.14)");
  g.addColorStop(.28,"rgba(0,0,0,0)");
  g.addColorStop(.78,"rgba(0,0,0,0)");
  g.addColorStop(1,"rgba(0,0,0,.2)");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  ctx.strokeStyle="rgba(245,241,230,.32)"; ctx.lineWidth=3;
  roundRect(ctx,42,42,W-84,H-84,28); ctx.stroke();

  ctx.textAlign="center";

  ctx.fillStyle=dim; ctx.font="500 36px "+FONT;
  ctx.fillText("─  116 國中教育會考  ─",CX,142);
  ctx.fillStyle=chalk; ctx.font="400 40px "+FONT;
  ctx.fillText(todayStr(),CX,214);

  if(days<0){
    ctx.fillStyle=chalk; ctx.font="700 96px "+FONT;
    ctx.fillText("會考結束，辛苦了",CX,640);
    ctx.font="400 46px "+FONT; ctx.fillStyle=dim;
    ctx.fillText("好好休息，等待好消息 🎉",CX,740);
  }else if(days===0){
    ctx.fillStyle=hi; ctx.font="800 110px "+FONT;
    ctx.fillText("今天，上場！",CX,560);
    ctx.fillStyle=chalk; ctx.font="400 48px "+FONT;
    wrapText(ctx,"深呼吸，把三年的累積穩穩寫上去。",840)
      .forEach((l,i)=>ctx.fillText(l,CX,690+i*80));
  }else{
    ctx.fillStyle=dim; ctx.font="500 44px "+FONT;
    ctx.fillText("距 離 會 考 還 有",CX,344);

    const numStr=String(days);
    ctx.font="800 310px "+FONT;
    const numW=ctx.measureText(numStr).width;
    ctx.font="700 76px "+FONT;
    const unitW=ctx.measureText("天").width;
    const gap=16, total=numW+gap+unitW;
    ctx.textAlign="left";
    ctx.fillStyle=chalk; ctx.font="800 310px "+FONT;
    ctx.fillText(numStr,CX-total/2,618);
    ctx.fillStyle=hi; ctx.font="700 76px "+FONT;
    ctx.fillText("天",CX-total/2+numW+gap,610);
    ctx.textAlign="center";

    ctx.save();
    ctx.translate(CX,662); ctx.rotate(-0.012);
    ctx.fillStyle=hi;
    roundRect(ctx,-Math.min(numW,420)/2,0,Math.min(numW,420),16,8);
    ctx.fill(); ctx.restore();

    const ms=milestone(days);
    const mk=currentMock();
    const zoneTop=724, zoneBottom=H-170;
    let groupH=0;
    if(ms) groupH+=66+34;
    if(mk) groupH+=168;
    let cursor=zoneTop+Math.max(0,(zoneBottom-zoneTop-groupH)/2);

    if(ms){
      ctx.font="600 36px "+FONT;
      const w=ctx.measureText(ms).width+84;
      ctx.fillStyle=hi;
      roundRect(ctx,CX-w/2,cursor,w,66,33); ctx.fill();
      ctx.fillStyle="#1A362E";
      ctx.fillText(ms,CX,cursor+46);
      cursor+=66+34;
    }

    if(mk){
      const ph=168;
      ctx.fillStyle="rgba(0,0,0,.2)";
      roundRect(ctx,110,cursor,W-220,ph,22); ctx.fill();
      ctx.strokeStyle="rgba(242,201,76,.4)"; ctx.lineWidth=2;
      roundRect(ctx,110,cursor,W-220,ph,22); ctx.stroke();

      ctx.font="600 40px "+FONT;
      if(mk.status==="ongoing"){
        ctx.fillStyle=hi;
        ctx.fillText("📝 "+mk.name+"・今天登場，穩住！",CX,cursor+64);
      }else{
        ctx.fillStyle=chalk;
        ctx.fillText("📝 "+mk.name+"・還有 "+mk.days+" 天",CX,cursor+64);
      }
      ctx.fillStyle=dim; ctx.font="400 34px "+FONT;
      ctx.fillText(fmtMD(mk.start)+"–"+fmtMD(mk.end)+"｜範圍 "+mk.scope+"（"+mk.vendor+"）",
                   CX,cursor+124);
    }
  }

  ctx.fillStyle=dim; ctx.font="400 34px "+FONT;
  ctx.fillText(BRAND_LINE,CX,H-104);

  if(IG_HANDLE){
    ctx.fillStyle="rgba(245,241,230,.5)";
    ctx.font="500 30px "+FONT;
    ctx.fillText("IG "+IG_HANDLE,CX,H-58);
  }

  return cv;
}

function textVersion(){
  const days=daysLeft();
  if(days<0) return "🌿 116 會考已經結束，辛苦了！好好休息，等待好消息 🎉";
  if(days===0) return "🌿 今天，就是會考的日子！深呼吸，把三年的累積穩穩寫上去 ✊";
  const ms=milestone(days);
  const mk=currentMock();
  let s="🌿 116 會考倒數 "+days+" 天\n📅 "+todayStr();
  if(ms) s+="\n🔔 "+ms;
  if(mk){
    s+= mk.status==="ongoing"
      ? "\n📝 "+mk.name+"今天登場，穩住！（範圍 "+mk.scope+"）"
      : "\n📝 距離"+mk.name+"還有 "+mk.days+" 天（"+fmtMD(mk.start)+"–"+fmtMD(mk.end)+"，範圍 "+mk.scope+"）";
  }
  return s;
}

let currentBlob=null, currentURL="";
function render(){
  document.getElementById("todayLabel").textContent=todayStr();
  document.getElementById("examDate").value=getExamDate();
  drawCard().toBlob(function(blob){
    currentBlob=blob;
    if(currentURL) URL.revokeObjectURL(currentURL);
    currentURL=URL.createObjectURL(blob);
    document.getElementById("cardImg").src=currentURL;
  },"image/png");
}

function fileName(){
  const d=new Date();
  return "cap116_"+(d.getMonth()+1)+"-"+d.getDate()+".png";
}

document.getElementById("dlBtn").addEventListener("click",()=>{
  if(!currentBlob) return;
  const file=new File([currentBlob],fileName(),{type:"image/png"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(()=>{});
    return;
  }
  const a=document.createElement("a");
  a.href=currentURL;
  a.download=fileName();
  document.body.appendChild(a); a.click(); a.remove();
});

document.getElementById("copyBtn").addEventListener("click",function(){
  const btn=this, str=textVersion();
  const done=()=>{
    btn.classList.add("done"); btn.textContent="已複製 ✓";
    setTimeout(()=>{btn.classList.remove("done");btn.textContent="複製文字版";},2000);
  };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(str).then(done);
  }else{
    const ta=document.createElement("textarea");
    ta.value=str; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    ta.setSelectionRange(0,str.length);
    document.execCommand("copy"); document.body.removeChild(ta);
    done();
  }
});

document.getElementById("examDate").addEventListener("change",function(){
  if(this.value){ localStorage.setItem("cap116_exam_date",this.value); render(); }
});

render();
setInterval(()=>{
  if(document.getElementById("todayLabel").textContent!==todayStr()) render();
},60000);
</script>
</body>
</html>
